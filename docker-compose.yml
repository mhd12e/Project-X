services:
  # ─── MySQL ───
  mysql:
    image: mysql:8.0
    container_name: projectx-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootchangeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-projectx}
      MYSQL_USER: ${MYSQL_USER:-projectx}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    ports:
      - "${MYSQL_EXTERNAL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - projectx

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: projectx-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - projectx

  # ─── Qdrant ───
  qdrant:
    image: qdrant/qdrant:latest
    container_name: projectx-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_EXTERNAL_PORT:-6333}:6333"
      - "${QDRANT_GRPC_EXTERNAL_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - projectx

  # ─── Backend API ───
  api:
    container_name: projectx-api
    build:
      context: ./backend
      target: ${APP_MODE:-debug}
    restart: unless-stopped
    environment:
      APP_MODE: ${APP_MODE:-debug}
      API_PORT: ${API_PORT:-3000}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-projectx}
      MYSQL_USER: ${MYSQL_USER:-projectx}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-random-string}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
    volumes:
      - ./backend/src:/app/src:delegated
      - /app/node_modules
      - uploads_data:/app/uploads
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - projectx

  # ─── Frontend ───
  web:
    container_name: projectx-web
    build:
      context: ./frontend
      target: ${APP_MODE:-debug}
    restart: unless-stopped
    environment:
      APP_MODE: ${APP_MODE:-debug}
    volumes:
      - ./frontend/src:/app/src:delegated
      - ./frontend/index.html:/app/index.html:delegated
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - projectx

  # ─── Nginx (reverse proxy) ───
  nginx:
    image: nginx:alpine
    container_name: projectx-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks:
      - projectx

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  uploads_data:

networks:
  projectx:
    driver: bridge
